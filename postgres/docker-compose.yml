services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: modeluser
      POSTGRES_PASSWORD: modelpassword
      POSTGRES_DB: external_model_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
